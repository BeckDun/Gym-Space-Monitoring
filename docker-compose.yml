version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: gsm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gsm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - gsm_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gsm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gsm_pgdata:
